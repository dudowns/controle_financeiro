name: deepseek
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 🔥 LOCALIZAÇÕES
  flutter_localizations:
    sdk: flutter
    
  # ========== DATABASE ==========
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.1.0
  
  # ========== UI E FORMATAÇÃO ==========
  intl: ^0.20.2
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^32.2.8  # 🔥 ATUALIZADO!
  
  # ========== NOTIFICAÇÕES ==========
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.0
  
  # ========== SERVIÇOS ==========
  shared_preferences: ^2.2.0
  csv: ^5.0.0
  share_plus: ^7.0.0
  http: ^1.1.0
  
  # ========== SEGURANÇA ==========
  crypto: ^3.0.0
  cryptography_plus: ^2.3.0
  cryptography_flutter_plus: ^2.3.0
  
  # ========== UTILITÁRIOS ==========
  uuid: ^4.0.0
  
  # ========== DESIGN ==========
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    icon_size: 48
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#6A1B9A"
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"